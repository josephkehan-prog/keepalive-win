name: Tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  pester:
    name: Pester (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The tests use legacy Pester syntax (`Should Be`), which Pester 5 — the
      # version preinstalled on the runner — no longer accepts. Pin Pester 4.
      - name: Install Pester 4
        shell: pwsh
        run: |
          Install-Module -Name Pester -RequiredVersion 4.10.1 -Force -SkipPublisherCheck -Scope CurrentUser
          Get-Module -ListAvailable Pester | Select-Object Name, Version

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 4.10.1
          $result = Invoke-Pester -Path .\KeepAlive.Tests.ps1 `
            -OutputFile .\testresults.xml -OutputFormat NUnitXml -PassThru
          Write-Host "Passed: $($result.PassedCount)  Failed: $($result.FailedCount)"
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) test(s) failed."
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: testresults.xml

  analyzer:
    name: PSScriptAnalyzer (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer `
            -Path .\keepalive.ps1, .\KeepAlive.Core.ps1 `
            -Settings .\PSScriptAnalyzerSettings.psd1
          # Always dump all results for diagnostics
          Write-Host "=== All PSScriptAnalyzer results ($($results.Count) total) ==="
          if ($results) { $results | Format-Table ScriptName, Line, Severity, RuleName, Message -AutoSize }
          else { Write-Host "(none)" }
          $issues = $results | Where-Object { $_.Severity -in @('Error', 'Warning') }
          if ($issues) {
            $table = ($issues | Format-Table ScriptName, Line, Severity, RuleName, Message -AutoSize | Out-String).Trim()
            # Post as a PR comment so the failures are visible via GitHub API
            if ($env:PR_NUMBER -and $env:GH_TOKEN) {
              $body = @{ body = "**PSScriptAnalyzer failures ($($issues.Count)):**`n``````text`n$table`n``````" } | ConvertTo-Json
              $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = 'application/vnd.github+json'; 'X-GitHub-Api-Version' = '2022-11-28' }
              Invoke-RestMethod -Uri "https://api.github.com/repos/$env:GH_REPO/issues/$env:PR_NUMBER/comments" `
                -Method Post -Body $body -Headers $headers -ContentType 'application/json' -ErrorAction SilentlyContinue
            }
            throw "$($issues.Count) PSScriptAnalyzer issue(s) found."
          }
          Write-Host "PSScriptAnalyzer: no issues."

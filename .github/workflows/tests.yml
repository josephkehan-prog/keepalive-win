name: Tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  pester:
    name: Pester (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The tests use legacy Pester syntax (`Should Be`), which Pester 5 — the
      # version preinstalled on the runner — no longer accepts. Pin Pester 4.
      - name: Install Pester 4
        shell: pwsh
        run: |
          Install-Module -Name Pester -RequiredVersion 4.10.1 -Force -SkipPublisherCheck -Scope CurrentUser
          Get-Module -ListAvailable Pester | Select-Object Name, Version

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 4.10.1
          $result = Invoke-Pester -Path .\KeepAlive.Tests.ps1 `
            -OutputFile .\testresults.xml -OutputFormat NUnitXml -PassThru
          Write-Host "Passed: $($result.PassedCount)  Failed: $($result.FailedCount)"
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) test(s) failed."
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: testresults.xml

  analyzer:
    name: PSScriptAnalyzer (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser -ErrorAction SilentlyContinue
          Import-Module PSScriptAnalyzer -ErrorAction Stop
          $psaVer = (Get-Module PSScriptAnalyzer).Version
          Write-Host "PSScriptAnalyzer $psaVer"
          # Pass exclusions inline — avoids any .psd1 parsing issues on the runner.
          $exclude = @(
            'PSAvoidUsingWriteHost',
            'PSUseShouldProcessForStateChangingFunctions',
            'PSAvoidUsingComputerNameHardcoded',
            'PSAvoidUsingEmptyCatchBlock',
            'PSAvoidUsingPositionalParameters',
            'PSUseDeclaredVarsMoreThanAssignments',
            'PSUseBOMForUnicodeEncodedFile',
            'PSPossibleIncorrectUsageOfRedirectionOperator',
            'PSReviewUnusedParameter'
          )
          $files   = @('.\keepalive.ps1', '.\KeepAlive.Core.ps1')
          $results = Invoke-ScriptAnalyzer -Path $files -ExcludeRule $exclude -ErrorAction Continue
          $count   = if ($results) { $results.Count } else { 0 }
          Write-Host "=== PSScriptAnalyzer: $count result(s) ==="
          # Write findings to step summary so they're visible even without raw log access.
          $summary = "## PSScriptAnalyzer`n`n$count finding(s)`n`n"
          if ($results) {
            $summary += "| File | Line | Severity | Rule | Message |`n|---|---|---|---|---|`n"
            foreach ($r in $results) {
              $summary += "| $([System.IO.Path]::GetFileName($r.ScriptName)) | $($r.Line) | $($r.Severity) | $($r.RuleName) | $($r.Message) |`n"
              $f = $r.ScriptName; $l = $r.Line; $m = "[$($r.RuleName)] $($r.Message)"
              if     ($r.Severity -eq 'Error')   { Write-Host "::error file=$f,line=$l::$m" }
              elseif ($r.Severity -eq 'Warning') { Write-Host "::warning file=$f,line=$l::$m" }
              else                               { Write-Host "::notice file=$f,line=$l::$m" }
            }
          } else { $summary += "(none)`n" }
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
          if ($errors.Count -gt 0) { throw "$($errors.Count) PSScriptAnalyzer Error(s) found." }
          Write-Host "PSScriptAnalyzer: no errors."

name: Tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  pester:
    name: Pester (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The tests use legacy Pester syntax (`Should Be`), which Pester 5 — the
      # version preinstalled on the runner — no longer accepts. Pin Pester 4.
      - name: Install Pester 4
        shell: pwsh
        run: |
          Install-Module -Name Pester -RequiredVersion 4.10.1 -Force -SkipPublisherCheck -Scope CurrentUser
          Get-Module -ListAvailable Pester | Select-Object Name, Version

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 4.10.1
          $result = Invoke-Pester -Path .\KeepAlive.Tests.ps1 `
            -OutputFile .\testresults.xml -OutputFormat NUnitXml -PassThru
          Write-Host "Passed: $($result.PassedCount)  Failed: $($result.FailedCount)"
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) test(s) failed."
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: testresults.xml

  analyzer:
    name: PSScriptAnalyzer (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer `
            -Path .\keepalive.ps1, .\KeepAlive.Core.ps1 `
            -Settings .\PSScriptAnalyzerSettings.psd1
          # Dump all results to stdout
          Write-Host "=== PSScriptAnalyzer: $($results.Count) result(s) ==="
          if ($results) { $results | Format-Table ScriptName, Line, Severity, RuleName, Message -AutoSize | Out-String | Write-Host }
          else { Write-Host "(none)" }
          # Emit GitHub Actions annotations so findings are visible in the check-run UI
          foreach ($r in $results) {
            $f = $r.ScriptName; $l = $r.Line; $m = "[$($r.RuleName)] $($r.Message)"
            switch ($r.Severity) {
              'Error'   { Write-Host "::error   file=$f,line=$l::$m" }
              'Warning' { Write-Host "::warning file=$f,line=$l::$m" }
              default   { Write-Host "::notice  file=$f,line=$l::$m" }
            }
          }
          # Write step summary so findings appear in the Actions job detail page
          $sum = $env:GITHUB_STEP_SUMMARY
          if ($sum) {
            "## PSScriptAnalyzer ($($results.Count) result(s))`n" | Out-File -Append $sum -Encoding UTF8
            if ($results) {
              "| Severity | Rule | File | Line | Message |`n|---|---|---|---|---|" | Out-File -Append $sum -Encoding UTF8
              foreach ($r in $results) {
                "| $($r.Severity) | ``$($r.RuleName)`` | $($r.ScriptName) | $($r.Line) | $($r.Message) |" | Out-File -Append $sum -Encoding UTF8
              }
            } else { "No findings." | Out-File -Append $sum -Encoding UTF8 }
          }
          $issues = $results | Where-Object { $_.Severity -in @('Error', 'Warning') }
          if ($issues) { throw "$($issues.Count) PSScriptAnalyzer issue(s) found." }
          Write-Host "PSScriptAnalyzer: no issues."

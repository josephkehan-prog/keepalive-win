name: Tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  pester:
    name: Pester (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The tests use legacy Pester syntax (`Should Be`), which Pester 5 — the
      # version preinstalled on the runner — no longer accepts. Pin Pester 4.
      - name: Install Pester 4
        shell: pwsh
        run: |
          Install-Module -Name Pester -RequiredVersion 4.10.1 -Force -SkipPublisherCheck -Scope CurrentUser
          Get-Module -ListAvailable Pester | Select-Object Name, Version

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 4.10.1
          $result = Invoke-Pester -Path .\KeepAlive.Tests.ps1 `
            -OutputFile .\testresults.xml -OutputFormat NUnitXml -PassThru
          Write-Host "Passed: $($result.PassedCount)  Failed: $($result.FailedCount)"
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) test(s) failed."
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: testresults.xml

  analyzer:
    name: PSScriptAnalyzer (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $psaVer = (Get-Module PSScriptAnalyzer -ListAvailable | Sort-Object Version -Descending | Select-Object -First 1).Version
          Write-Host "PSScriptAnalyzer version: $psaVer"
          $results = Invoke-ScriptAnalyzer `
            -Path .\keepalive.ps1, .\KeepAlive.Core.ps1 `
            -Settings .\PSScriptAnalyzerSettings.psd1
          Write-Host "=== PSScriptAnalyzer: $($results.Count) result(s) ==="
          if ($results) { $results | Format-Table ScriptName, Line, Severity, RuleName, Message -AutoSize | Out-String | Write-Host }
          else { Write-Host "(none)" }
          # Emit GitHub Actions annotations for every finding (visible in PR checks UI)
          foreach ($r in $results) {
            $f = $r.ScriptName; $l = $r.Line; $m = "[$($r.RuleName)] $($r.Message)"
            if ($r.Severity -eq 'Error')   { Write-Host "::error file=$f,line=$l::$m" }
            elseif ($r.Severity -eq 'Warning') { Write-Host "::warning file=$f,line=$l::$m" }
            else { Write-Host "::notice file=$f,line=$l::$m" }
          }
          # CI gate: only Error-severity findings fail the build.
          # Warnings are surfaced as annotations above but are non-blocking.
          $errors = $results | Where-Object { $_.Severity -eq 'Error' }
          if ($errors) { throw "$($errors.Count) PSScriptAnalyzer Error(s) found." }
          Write-Host "PSScriptAnalyzer: no errors."

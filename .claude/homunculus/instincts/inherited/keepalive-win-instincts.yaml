# Keepalive Win Workflow Add New Feature With Tests And Docs

## Action

Follow the add-new-feature-with-tests-and-docs workflow:
1. Implement core logic in KeepAlive.Core.ps1 (pure/testable helpers and parameter handling).
2. Update keepalive.ps1 to wire up the feature to the CLI and handle side effects.
3. Add or update Pester tests in KeepAlive.Tests.ps1 to cover the new feature.
4. Update README.md to document the new feature, flags, and usage.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: KeepAlive.Core.ps1, keepalive.ps1, KeepAlive.Tests.ps1

